<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanDrip</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/lucide-static@0.525.0/font/lucide.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">
            <h1>URBANDRIP</h1>
        </div>

        <div class="middle">
            <h1>ABOUT</h1>
            <h1>COLLECTIONS</h1>
            <h1>SHOP</h1>
            <h1>CONTACT</h1>
        </div>

        <div class="search">
            <button class="icon-btn">
                <i class="icon-search"></i>
            </button>
            <button class="icon-btn">
                <i class="icon-shopping-bag"></i>
            </button>
        </div>
    </div>


    <div class="hero">
        <h1 class="bg-text">DRESSUP</h1>
        <h2 id="style">STYLE YOUR LOOK</h2>
        <button id="shop-now">
            SHOP NOW
        </button>
        
        <img src="images/model png.png" alt="Fashion Banner">

        <div class="hero-content">
        </div>
    </div>

    <div class="category">
        <h1>CATEGORIES</h1>
        <div class="box">
            <div class="box1">
                <h1>MEN</h1>
                <img src="images/men1.png" alt="">

            </div>
            <div class="box1">
                 <h1>WOMEN</h1>
                <img src="images/women png.png" alt="">

            </div>
            <div class="box1">
                 <h1>KIDS</h1>
                <img src="images/kidspng.png" alt="">

            </div>
            <div class="box1">
                  <h1>ACCESSORIES</h1>
                <img src="images/accessoriespng.png" alt="">

            </div>
        </div>
    </div>

    <div class="browse">
        <div class="box2">
            <h1>BROWSE  <br> CATEGORIES</h1>
            <h2>Our categories match by your taste</h2>
            <button id="check">Check it out</button>
            
        </div>
        <div class="box3">
            <img src="images/suitpng.png" alt="">

        </div>
    </div>


    

    <script src="script.js"></script>
</body>

</html>
